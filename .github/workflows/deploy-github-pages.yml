name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build:gh-pages
      - run: test -f dist/client/fluentspeak/index.html
      - run: test -f dist/client/fluentspeak/app-ads.txt
      - run: test -f dist/client/app-ads.txt
      - run: grep -q 'pub-8055879971747825' dist/client/fluentspeak/app-ads.txt
      - run: cmp -s dist/client/app-ads.txt dist/client/fluentspeak/app-ads.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
